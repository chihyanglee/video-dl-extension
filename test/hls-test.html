<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HLS Test Page — Video DL</title>
    <!-- hls.js served locally (copied from node_modules) — no CDN dependency,
         works offline, no supply-chain exposure. -->
    <script src="./hls.min.js"></script>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; background: #0f1115; color: #e6e9ef; }
      h1 { font-size: 18px; }
      select, button { font: inherit; padding: 6px 10px; border-radius: 6px; border: 1px solid #333; background: #1f2430; color: inherit; }
      video { width: 100%; margin-top: 1rem; background: #000; border-radius: 8px; }
      .note { color: #8b93a3; font-size: 13px; }
      code { background: #1f2430; padding: 1px 5px; border-radius: 4px; }
      .row { display: flex; gap: 8px; align-items: center; margin: 1rem 0; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <h1>HLS Test Page — Video DL extension</h1>
    <p class="note">
      Pick a stream and press <b>Load</b>. This fetches the <code>.m3u8</code> so the
      extension's service worker detects it. Open the extension side panel to see it
      listed, then download.
    </p>

    <div class="row">
      <select id="stream"></select>
      <button id="load">Load</button>
    </div>
    <p class="note" id="desc"></p>

    <video id="video" controls muted playsinline></video>

    <script>
      // Known-good public, non-DRM test streams. mode controls how the page
      // triggers detection: 'hls' plays via hls.js; 'dash' just fetches the MPD
      // (playback would need dash.js, but a fetch is enough to detect); 'file'
      // sets a native <video src> (request type 'media' → direct-file detect).
      const STREAMS = [
        {
          mode: 'hls',
          name: 'HLS — Mux Tears of Steel (master, TS) ✅ primary',
          url: 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8',
          desc: 'HLS multi-variant master, MPEG-TS segments, VOD. The HLS smoke-test target.',
        },
        {
          mode: 'hls',
          name: 'HLS — Apple BipBop advanced (fMP4/CMAF)',
          url: 'https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8',
          desc: 'HLS fMP4/CMAF segments with #EXT-X-MAP init segment.',
        },
        {
          mode: 'dash',
          name: 'DASH — Big Buck Bunny 30fps (static, SegmentTemplate)',
          url: 'https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd',
          desc: 'DASH VOD, separate video + audio AdaptationSets, $Number$ SegmentTemplate. Exercises the DASH mux path. (Page fetches the MPD to trigger detection; download via the side panel.)',
        },
        {
          mode: 'dash',
          name: 'DASH — DASH-IF envivio (static)',
          url: 'https://dash.akamaized.net/envivio/EnvivioDash3/manifest.mpd',
          desc: 'Another DASH VOD with separate audio/video. Detection via MPD fetch.',
        },
        {
          mode: 'file',
          name: 'FILE — Big Buck Bunny (direct .mp4)',
          url: 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4',
          desc: 'A plain progressive .mp4 played in a native <video>. Triggers direct-file detection (no ffmpeg; downloads as-is).',
        },
        {
          mode: 'hls',
          name: 'AES-128 / custom — paste your own below',
          url: '',
          desc: 'Paste any URL via ?url=... (and ?mode=hls|dash|file) — e.g. an AES-128 HLS VOD to test the decrypt path.',
        },
      ];

      const sel = document.getElementById('stream');
      const desc = document.getElementById('desc');
      const video = document.getElementById('video');
      let hls;

      STREAMS.forEach((s, i) => {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = s.name;
        sel.appendChild(o);
      });

      // Allow ?url=... (+ optional ?mode=) override.
      const params = new URLSearchParams(location.search);
      const override = params.get('url');
      const overrideMode = params.get('mode');

      function descFor(i) {
        desc.textContent = STREAMS[i].desc;
      }
      sel.addEventListener('change', () => descFor(sel.value));
      descFor(0);

      function load() {
        const stream = STREAMS[sel.value];
        const url = override || stream.url;
        const mode = override ? overrideMode || stream.mode : stream.mode;
        if (!url) {
          desc.textContent = 'No URL — pick another stream or pass ?url=...';
          return;
        }
        if (hls) {
          hls.destroy();
          hls = null;
        }
        video.removeAttribute('src');
        video.load();

        if (mode === 'dash') {
          // No dash.js here — a plain fetch is enough for the extension to
          // detect the .mpd. Playback is optional for testing detection.
          desc.textContent = 'Fetching MPD to trigger detection… open the side panel.';
          fetch(url, { credentials: 'include' })
            .then(() => (desc.textContent = 'MPD fetched. Check the side panel for the DASH entry.'))
            .catch((e) => (desc.textContent = 'MPD fetch failed: ' + e));
          return;
        }
        if (mode === 'file') {
          video.src = url; // native <video> → request type 'media' → file detect
          video.play().catch(() => {});
          return;
        }
        // hls
        if (window.Hls && Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url; // Safari native
          video.play().catch(() => {});
        }
      }
      document.getElementById('load').addEventListener('click', load);
      if (override) load();
    </script>
  </body>
</html>
